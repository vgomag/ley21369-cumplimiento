[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[functions."chat"]
  external_node_modules = ["@anthropic-ai/sdk"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
